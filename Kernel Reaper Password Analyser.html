<!DOCTYPE html>
<html>
<head>
<title>Kernel Reaper Password Analyzer</title>

<style>
body {
  background:black;
  color:#00ff9f;
  font-family: monospace;
  text-align:center;
}

.container {
  margin-top:30px;
}

.logo {
  font-size:28px;
  font-weight:bold;
}

.tagline {
  font-size:14px;
  color:#0affc6;
  margin-bottom:20px;
}

input, button {
  padding:10px;
  margin:10px;
  background:#111;
  color:#00ff9f;
  border:1px solid #00ff9f;
}

button:hover {
  background:#00ff9f;
  color:black;
}

.bar {
  width:80%;
  height:10px;
  margin:auto;
  background:#222;
}

.fill {
  height:10px;
  width:0%;
  background:red;
}

#scan {
  color:#00ff9f;
  font-size:14px;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">KERNEL REAPER ☠️</div>
<div class="tagline">Where Code Meets Chaos</div>

<input type="text" id="password" placeholder="Enter Password">
<br>
<button onclick="check()">Analyze</button>

<div id="scan"></div>

<div class="bar"><div id="fill" class="fill"></div></div>

<h2 id="strength"></h2>
<h3 id="time"></h3>
<h2 id="emoji"></h2>

<hr>

<h2>Generate Strong Password</h2>

<label>Length (8–32): </label>
<input type="number" id="length" min="8" max="32" value="16">

<br>

<label>Include Special Characters</label>
<input type="checkbox" id="special" checked>

<br>

<button onclick="generate()">Generate</button>

<h3 id="generated"></h3>

<button onclick="copyPass()">Copy Password</button>

</div>

<script>

function check() {
  let pass = document.getElementById("password").value;

  document.getElementById("scan").innerText = "Scan Initiated...";

  setTimeout(() => {
    let strength = 0;

    if(pass.length >= 8) strength++;
    if(pass.length >= 16) strength++;
    if(/[A-Z]/.test(pass)) strength++;
    if(/[a-z]/.test(pass)) strength++;
    if(/[0-9]/.test(pass)) strength++;
    if(/[^A-Za-z0-9]/.test(pass)) strength++;

    let text = "";
    let emoji = "";
    let color = "";
    let time = "";

    if(strength <= 2) {
      text = "WEAK ⚠️";
      emoji = "💀";
      color = "red";
      time = "Crack Time: Seconds";
    }
    else if(strength <= 4) {
      text = "MEDIUM ⚡";
      emoji = "😐";
      color = "orange";
      time = "Crack Time: Hours/Days";
    }
    else {
      text = "STRONG 🔥";
      emoji = "🛡️";
      color = "lime";
      time = "Crack Time: Years+";
    }

    document.getElementById("strength").innerText = text;
    document.getElementById("emoji").innerText = emoji;
    document.getElementById("time").innerText = time;

    document.getElementById("fill").style.width = (strength/6)*100 + "%";
    document.getElementById("fill").style.background = color;

    document.getElementById("scan").innerText = "Scan Complete ✔️";

    if(strength <= 2){
      alert("⚠️ Weak Password!\n\nUse at least 16 characters, 4 special symbols, mix upper/lowercase & numbers.\nUse a strong generator (like ours).");
    }

  }, 1000);
}

function generate() {
  let length = document.getElementById("length").value;
  let useSpecial = document.getElementById("special").checked;

  let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let special = "!@#$%^&*()_+";

  if(useSpecial) chars += special;

  let pass = "";

  for(let i=0;i<length;i++){
    pass += chars.charAt(Math.floor(Math.random()*chars.length));
  }

  document.getElementById("generated").innerText = pass;
}

function copyPass() {
  let pass = document.getElementById("generated").innerText;

  if(pass === "") {
    alert("Generate password first!");
    return;
  }

  navigator.clipboard.writeText(pass);
  alert("Copied to clipboard ✔️");
}

</script>

</body>
</html>
